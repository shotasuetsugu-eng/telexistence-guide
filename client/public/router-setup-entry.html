<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ルーター設定 | Telexistence Guide</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020706;
        --card: #07110f;
        --line: rgba(0, 229, 200, 0.32);
        --text: #f4fffd;
        --muted: #8aa39e;
        --primary: #00e5c8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(to bottom, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 4px);
        opacity: .28;
      }
      main { width: min(1120px, 100%); margin: 0 auto; padding: 24px; }
      h1 { margin: 0; color: var(--primary); font-size: clamp(28px, 4vw, 42px); letter-spacing: 0; }
      h2 { margin: 0 0 14px; font-size: 20px; }
      p { color: var(--muted); line-height: 1.7; }
      .mono { color: #4cff4c; font-family: Consolas, monospace; text-transform: uppercase; letter-spacing: 0; }
      .card {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(7,17,15,.96), rgba(4,10,9,.96));
        padding: 18px;
        box-shadow: 0 0 22px rgba(0, 229, 200, .08);
      }
      .status { border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; color: var(--primary); background: rgba(0,229,200,.08); }
      .grid { display: grid; gap: 12px; }
      @media (min-width: 720px) { .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      label span, .label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; }
      input, select {
        width: 100%;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 6px;
        background: #020706;
        color: var(--text);
        padding: 11px 12px;
        font: inherit;
      }
      button, a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(0,229,200,.12);
        color: var(--primary);
        padding: 10px 13px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
      button.primary, a.button.primary { border-color: var(--primary); background: var(--primary); color: #001b17; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
      .value { width: 100%; justify-content: flex-start; background: #03100e; color: var(--text); }
      .frame { display: none; margin-top: 14px; }
      .frame.is-open { display: block; }
      iframe { width: 100%; height: min(720px, 78vh); border: 1px solid rgba(255,255,255,.16); border-radius: 8px; background: #fff; }
      pre { white-space: pre-wrap; border: 1px solid rgba(255,255,255,.14); border-radius: 8px; background: #020706; padding: 14px; color: var(--text); line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <h1>Router Setup</h1>
      <p class="mono">// TP_LINK_CONFIGURATION_HELPER</p>

      <section class="card">
        <h2>TP-Link ルーター設定</h2>
        <p>
          オンライン時は通常のルーター設定ページへ移動します。オフライン時はこの固定ページで設定値を確認できます。
          Wi-Fi名とパスワードは公開HTMLに固定保存せず、必要時に現場で入力してください。
        </p>
        <div id="status" class="status">接続状態を確認しています...</div>
        <div class="actions">
          <a class="button primary" href="/Wifi-setup">オンライン版を開く</a>
          <button type="button" data-copy-all>設定値をコピー</button>
          <button type="button" data-toggle="router-frame">TP-Link管理画面を表示</button>
        </div>

        <div class="grid two" style="margin-top: 14px">
          <label style="grid-column: 1 / -1">
            <span>店舗タイプ</span>
            <select id="storeType">
              <option value="SEJ">SEJ</option>
              <option value="FM">FM</option>
            </select>
          </label>
          <label>
            <span>SSID</span>
            <input id="ssid" placeholder="現場で入力" />
          </label>
          <label>
            <span>Wi-Fi Password</span>
            <input id="wifiPassword" placeholder="現場で入力" />
          </label>
          <label style="grid-column: 1 / -1">
            <span>ルーター設定ページ</span>
            <input id="routerUrl" value="http://192.168.200.1" />
          </label>
        </div>

        <div id="router-frame" class="frame">
          <iframe id="routerIframe" title="TP-Link管理画面"></iframe>
          <p>表示されない場合は、対象TP-Linkルーターへ接続してからページを再読み込みしてください。</p>
        </div>
      </section>

      <section class="card">
        <h2 id="networkTitle">SEJネットワーク設定</h2>
        <div id="networkValues" class="grid two"></div>
        <div class="actions"><button type="button" data-toggle="network-frame">設定画面を表示</button></div>
        <div id="network-frame" class="frame"><iframe id="networkIframe" title="ネットワーク設定画面"></iframe></div>
      </section>

      <section class="card">
        <h2>固定IPリスト</h2>
        <div id="fixedIpValues" class="grid"></div>
        <div class="actions"><button type="button" data-toggle="dhcp-frame">設定画面を表示</button></div>
        <div id="dhcp-frame" class="frame"><iframe id="dhcpIframe" title="固定IP設定画面"></iframe></div>
      </section>

      <section class="card">
        <h2>コピー用まとめ</h2>
        <pre id="summary"></pre>
      </section>
    </main>

    <script>
      const devices = [
        ["Robot", "192.168.200.8"],
        ["PICO", "192.168.200.90"],
        ["Front Cam / FC", "192.168.200.60"],
        ["Back Cam / BC", "192.168.200.61"],
      ];
      const qs = (selector) => document.querySelector(selector);
      const normalizeRouterUrl = (value) => {
        const trimmed = value.trim();
        const withProtocol = /^https?:\/\//i.test(trimmed) ? trimmed : `http://${trimmed || "192.168.200.1"}`;
        return withProtocol.replace(/\/+$/, "");
      };
      const copy = async (value) => {
        try {
          await navigator.clipboard.writeText(value);
          alert("コピーしました");
        } catch {
          window.prompt("コピーしてください", value);
        }
      };
      function currentValues() {
        return {
          storeType: qs("#storeType").value,
          ssid: qs("#ssid").value,
          wifiPassword: qs("#wifiPassword").value,
          routerUrl: normalizeRouterUrl(qs("#routerUrl").value),
        };
      }
      function settingText() {
        const { storeType, ssid, wifiPassword, routerUrl } = currentValues();
        return `[TP-Link Router Settings]

Store Type: ${storeType}

[Common]
SSID: ${ssid || "(現場で入力)"}
Wi-Fi Password: ${wifiPassword || "(現場で入力)"}
Router URL: ${routerUrl}

[Internet Setting]
${storeType === "SEJ"
  ? `Connection Type: 静的IP
IP Address: 192.168.97.9
Subnet Mask: 255.255.255.0
Gateway: 192.168.97.1
Primary DNS: 8.8.8.8
Secondary DNS: 1.1.1.1`
  : `Connection Type: V6プラス`}

[Fixed IP]
${devices.map(([name, ip]) => `${name}: ${ip}`).join("\n")}`;
      }
      function renderNetwork() {
        const storeType = qs("#storeType").value;
        const values = storeType === "SEJ"
          ? [["インターネット接続タイプ", "静的IP"], ["IPアドレス", "192.168.97.9"], ["サブネットマスク", "255.255.255.0"], ["ゲートウェイ", "192.168.97.1"], ["プライマリーDNS", "8.8.8.8"], ["セカンダリーDNS", "1.1.1.1"]]
          : [["インターネット接続タイプ", "V6プラス"]];
        qs("#networkTitle").textContent = storeType === "SEJ" ? "SEJネットワーク設定" : "FMネットワーク設定";
        qs("#networkValues").innerHTML = values.map(([label, value]) => `<div><span class="label">${label}</span><button class="value" type="button" data-copy="${value}">${value}</button></div>`).join("");
      }
      function renderFixedIp() {
        qs("#fixedIpValues").innerHTML = devices.map(([name, ip]) => `<div class="grid two"><input value="${name}" readonly><button class="value" type="button" data-copy="${ip}">${ip}</button></div>`).join("");
      }
      function updateFrames() {
        const { routerUrl } = currentValues();
        qs("#routerIframe").src = routerUrl;
        qs("#networkIframe").src = `${routerUrl}/#networkBasic`;
        qs("#dhcpIframe").src = `${routerUrl}/#dhcpServerAdv`;
        qs("#summary").textContent = settingText();
      }
      function render() {
        renderNetwork();
        renderFixedIp();
        updateFrames();
      }
      window.addEventListener("online", () => { qs("#status").textContent = "オンライン: 通常のルーター設定ページへ移動できます。"; });
      window.addEventListener("offline", () => { qs("#status").textContent = "オフライン: この固定ページで設定値を確認できます。"; });
      document.addEventListener("click", (event) => {
        const copyValue = event.target.closest("[data-copy]")?.getAttribute("data-copy");
        if (copyValue) copy(copyValue);
        if (event.target.closest("[data-copy-all]")) copy(settingText());
        const frameId = event.target.closest("[data-toggle]")?.getAttribute("data-toggle");
        if (frameId) {
          document.getElementById(frameId).classList.toggle("is-open");
          updateFrames();
        }
      });
      ["#storeType", "#ssid", "#wifiPassword", "#routerUrl"].forEach((selector) => {
        qs(selector).addEventListener("input", render);
        qs(selector).addEventListener("change", render);
      });
      qs("#status").textContent = navigator.onLine ? "オンライン: 通常のルーター設定ページへ移動できます。" : "オフライン: この固定ページで設定値を確認できます。";
      if (navigator.onLine && !new URLSearchParams(location.search).has("stay")) location.replace("/Wifi-setup");
      render();
    </script>
  </body>
</html>
